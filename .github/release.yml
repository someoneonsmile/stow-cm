# GitHub 自动生成 Release Notes 的配置
# 当 release.yml 中 generate_release_notes: true 时生效
# 文档: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title:  🚀 新功能
      labels:
        - feat
        - feature
        - enhancement

    - title:  🐛 修复
      labels:
        - fix
        - bug
        - bugfix

    - title:  📚 文档
      labels:
        - docs
        - documentation

    - title:  ⚡ 性能
      labels:
        - perf
        - performance

    - title:  🔧 维护
      labels:
        - chore
        - refactor
        - ci
        - test
        - build
        - deps
        - dependencies

    - title:  其他变更
      labels:
        - "*"
